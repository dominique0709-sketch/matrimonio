<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nuestra Boda</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
    font-family:'Montserrat',sans-serif;
    background:#f8f6f2;
    color:#5a5a5a;
    text-align:center;
    overflow-x:hidden;
}

/* SECCIONES GENERALES */
.section{
    min-height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    padding:120px 25px;
}

.hidden{display:none;}

/* CORAZÓN INICIAL */
.heart-container{
    cursor:pointer;
    display:flex;
    flex-direction:column;
    align-items:center;
}

.heart{
    width:140px;
    height:140px;
    background:#c7a977;
    position:relative;
    transform:rotate(-45deg);
    animation:pulse 1.2s infinite;
}

.heart:before,
.heart:after{
    content:"";
    width:140px;
    height:140px;
    background:#c7a977;
    border-radius:50%;
    position:absolute;
}

.heart:before{top:-70px;left:0;}
.heart:after{left:70px;top:0;}

@keyframes pulse{
0%{transform:rotate(-45deg) scale(1);}
50%{transform:rotate(-45deg) scale(1.15);}
100%{transform:rotate(-45deg) scale(1);}
}

.heart-text{
    margin-top:40px;
    font-size:28px;
    letter-spacing:4px;
    color:#b89b6a;
}

/* HERO */
.hero{
    background:url('https://images.pexels.com/photos/461198/pexels-photo-461198.jpeg?auto=compress&cs=tinysrgb&w=1600') center/cover no-repeat;
    position:relative;
    color:white;
}

.hero::before{
    content:"";
    position:absolute;
    inset:0;
    background:rgba(0,0,0,0.35);
}

.hero-content{
    position:relative;
    z-index:2;
}

.hero h1{
    font-family:'Playfair Display',serif;
    font-size:48px;
    margin-bottom:25px;
}

.countdown{
    font-size:28px;
    letter-spacing:2px;
}

/* TARJETAS */
.card{
    background:white;
    padding:80px 40px;
    margin:100px auto;
    max-width:700px;
    border-radius:30px;
    box-shadow:0 20px 60px rgba(0,0,0,0.08);
}

.card h2{
    font-family:'Playfair Display',serif;
    font-size:34px;
    margin-bottom:30px;
    color:#b89b6a;
}

.separator{
    width:120px;
    height:2px;
    background:#c7a977;
    margin:40px auto;
}

/* BOTONES */
.btn{
    margin-top:35px;
    padding:15px 40px;
    border:none;
    border-radius:30px;
    background:#c7a977;
    color:white;
    font-size:16px;
    cursor:pointer;
    transition:.3s;
}

.btn:hover{
    background:#b89b6a;
}

/* GALERÍA */
.gallery img{
    width:100%;
    max-width:500px;
    border-radius:20px;
    margin:40px 0;
}

/* INPUTS */
input,textarea{
    width:100%;
    padding:15px;
    margin-top:20px;
    border-radius:15px;
    border:1px solid #ddd;
}

</style>
</head>
<body>

<!-- CORAZÓN -->
<div class="section" id="start">
    <div class="heart-container" onclick="openInvite()">
        <div class="heart"></div>
        <div class="heart-text">PULSA</div>
    </div>
</div>

<!-- HERO -->
<div class="section hero hidden" id="hero">
    <div class="hero-content">
        <h1 contenteditable="true">Diego & Camila</h1>
        <div class="countdown" id="countdown">Faltan XXX días</div>
    </div>
</div>

<!-- CEREMONIA -->
<div class="card hidden" id="content">

    <h2>Ceremonia</h2>
    <p contenteditable="true">Sábado XX de Noviembre</p>
    <p contenteditable="true">Salón XXXX</p>
    <div class="separator"></div>

    <h2>Nuestra Historia</h2>
    <div class="gallery">
        <img src="https://via.placeholder.com/500">
        <img src="https://via.placeholder.com/500">
    </div>

    <div class="separator"></div>

    <h2>Música</h2>
    <p>¿Qué canción no puede faltar?</p>
    <input type="text" placeholder="Sugerir canción">

    <div class="separator"></div>

    <h2>Regalos</h2>
    <p contenteditable="true">Si deseas obsequiarnos algo más que tu presencia...</p>
    <button class="btn">Ver más</button>

    <div class="separator"></div>

    <h2>Confirmación</h2>
    <button class="btn">Confirmar asistencia</button>

</div>

<script>
function openInvite(){
    document.getElementById("start").classList.add("hidden");
    document.getElementById("hero").classList.remove("hidden");
    document.getElementById("content").classList.remove("hidden");
}

var fecha = new Date("2026-11-20").getTime();
setInterval(function(){
    var now = new Date().getTime();
    var diff = fecha - now;
    var days = Math.floor(diff/(1000*60*60*24));
    document.getElementById("countdown").innerHTML = "Faltan " + days + " días";
},1000);
</script>

</body>
</html>
